<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - ALKING STORE</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-text">AS</span>
            </div>
            <div class="nav-links">
                <a href="index.html" class="nav-link">الرئيسية</a>
                <a href="scripts.html" class="nav-link">المنتجات</a>
                <a href="license.html" class="nav-link">الترخيص</a>
                <a href="free.html" class="nav-link">مجاني</a>
            </div>
        </div>
    </nav>

    <!-- Register Container -->
    <div class="auth-container">
        <div class="auth-form-wrapper">
            <div class="auth-header">
                <h2>أنشئ حسابك الآن!</h2>
                <p>انضم إلى منصة ALKING STORE</p>
            </div>

            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label>اسم المستخدم</label>
                    <input type="text" id="username" placeholder="اختر اسم مستخدم" required>
                </div>

                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="email" placeholder="example@email.com" required>
                </div>

                <div class="form-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn btn-primary btn-full">إنشاء الحساب</button>
            </form>

            <p class="auth-footer">هل لديك حساب بالفعل؟ <a href="login.html">سجّل الدخول</a></p>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('http://localhost:5000/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const data = await response.json();
                if (response.ok) {
                    alert('تم إنشاء الحساب بنجاح! سجّل دخولك الآن');
                    window.location.href = 'login.html';
                } else {
                    alert(data.message);
                }
            } catch (error) {
                alert('خطأ في الاتصال بالخادم');
                console.error(error);
            }
        });
    </script>
</body>
</html>
